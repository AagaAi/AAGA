<!-- Copy the full dashboard.html from earlier, and add this card after the "Trade Reviews" div -->
<div class="card" style="margin-bottom:30px;">
  <h3>📊 Strategy Performance (Last Month Backtest)</h3>
  <div id="strategyCompare">--</div>
  <button onclick="loadStrategyCompare()">Refresh Comparison</button>
</div>
<script>
  async function loadStrategyCompare() {
    try {
      const res = await fetch('/compare-strategies');
      const data = await res.json();
      let html = '';
      if (data.error) {
        html = data.error;
      } else {
        data.results.forEach(r => {
          html += `<div class="trade-review">
            <b>${r.strategy}</b>: Trades ${r.trades}, Win Rate ${r.win_rate}%, ROI ${r.roi}%, Balance $${r.final_balance}
          </div>`;
        });
        if (data.best_strategy) {
          html += `<p><b>🏆 Best: ${data.best_strategy}</b></p>`;
        }
      }
      document.getElementById('strategyCompare').innerHTML = html || 'No data';
    } catch(e) { console.error(e); }
  }
  loadStrategyCompare();
  setInterval(loadStrategyCompare, 600000); // every 10 min
</script>
